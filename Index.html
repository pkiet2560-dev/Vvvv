<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Omni-Lab: DNA Fusion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="omnitrix-container">
        <h1>OMNI-LAB: BIOMNITRIX SYSTEM</h1>
        
        <div class="fusion-panel">
            <div class="dna-slot">
                <label>ADN 1 (Chính chủ/Fan)</label>
                <select id="dna1"></select>
            </div>

            <div class="plus">+</div>

            <div class="dna-slot">
                <label>ADN 2 (Chính chủ/Fan)</label>
                <select id="dna2"></select>
            </div>
        </div>

        <button onclick="fuseDNA()">KÍCH HOẠT HỢP NHẤT</button>

        <div id="result" class="result-box">
            <h2 id="hybrid-name">Đang chờ ADN...</h2>
            <p id="hybrid-desc">Chọn 2 loài để xem kết quả hợp nhất.</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
